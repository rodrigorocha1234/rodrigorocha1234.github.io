<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<header>
    <h1>Rodrigo Rocha</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/projects">Projetos</a>
        <a href="/about">Sobre</a>
    </nav>
</header>

<main class="post-container">
    <article class="post-content">
        <h1>{{ page.title }}</h1>

        {% if page.tags %}
        <div class="post-tags">
            {% for tag in page.tags %}
                <span>{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}

        <div class="post-body">
            {{ content }}
        </div>
    </article>
</main>

<footer>
    <p>© 2026 Rodrigo Rocha</p>
</footer>

</body>
</html>
